name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger en tags como v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a liberar (ej: 1.0.0)'
        required: true

jobs:
  test-before-release:
    name: Ejecutar Tests Antes de Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Ejecutar suite completa de tests
      run: |
        pytest -v --cov=src --cov-report=term-missing --cov-fail-under=70

    - name: Verificar que no hay errores de linting críticos
      run: |
        pylint src/ --fail-under=7.0 || true
      continue-on-error: true

  create-release:
    name: Crear Release
    runs-on: ubuntu-latest
    needs: test-before-release

    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Obtener versión
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Versión: $VERSION"

    - name: Generar changelog
      id: changelog
      run: |
        # Obtener el último tag
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        if [ -z "$LAST_TAG" ]; then
          echo "📝 Primera release - incluyendo todo el historial"
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          echo "📝 Cambios desde $LAST_TAG"
          CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi

        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Crear Release en GitHub
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        release_name: Release v${{ steps.get_version.outputs.version }}
        body: |
          ## 🚀 Release v${{ steps.get_version.outputs.version }}

          ### 📋 Cambios en esta versión:
          ${{ steps.changelog.outputs.changelog }}

          ### 📦 Instalación

          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd ${{ github.event.repository.name }}
          pip install -r requirements.txt
          ```

          ### ✅ Tests
          Todos los tests han pasado exitosamente antes de este release.

          ---
          🤖 Release generado automáticamente por GitHub Actions
        draft: false
        prerelease: false

  notify-release:
    name: Notificar Release
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - name: Notificación de release exitoso
      run: |
        echo "✅ Release v${{ needs.create-release.outputs.version }} creado exitosamente"
        echo "🎉 El proyecto ha sido liberado"
