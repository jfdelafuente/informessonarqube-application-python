name: Tests y Calidad de Código

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:  # Permite ejecución manual

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Instalar dependencias del sistema
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade setuptools wheel

    - name: Instalar dependencias del proyecto
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Mostrar versiones instaladas
      run: |
        echo "Python version:"
        python --version
        echo ""
        echo "Pip version:"
        pip --version
        echo ""
        echo "Installed packages:"
        pip list

    - name: Ejecutar tests unitarios
      run: |
        pytest tests/unit/ -v --tb=short

    - name: Ejecutar tests de integración
      run: |
        pytest tests/integration/ -v --tb=short

    - name: Ejecutar todos los tests con cobertura
      run: |
        pytest --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=70

    - name: Subir cobertura a Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Generar reporte de cobertura HTML
      if: matrix.python-version == '3.11'
      run: |
        pytest --cov=src --cov-report=html

    - name: Subir reporte de cobertura como artefacto
      if: matrix.python-version == '3.11'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30

  lint:
    name: Linting y Formateo
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias de linting
      run: |
        pip install pylint black isort mypy

    - name: Ejecutar pylint
      run: |
        pylint src/ --disable=C0114,C0115,C0116 --max-line-length=100 || true
      continue-on-error: true

    - name: Verificar formateo con Black
      run: |
        black --check src/ tests/ || true
      continue-on-error: true

    - name: Verificar orden de imports con isort
      run: |
        isort --check-only src/ tests/ || true
      continue-on-error: true

  security:
    name: Análisis de Seguridad
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar pip-audit
      run: |
        pip install pip-audit

    - name: Auditoría de seguridad de dependencias
      run: |
        pip install -r requirements.txt
        pip-audit --desc || true
      continue-on-error: true

  summary:
    name: Resumen de Tests
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: always()

    steps:
    - name: Verificar estado de jobs
      run: |
        echo "Estado de tests: ${{ needs.test.result }}"
        echo "Estado de linting: ${{ needs.lint.result }}"
        echo "Estado de seguridad: ${{ needs.security.result }}"

    - name: Marcar como exitoso si tests pasaron
      if: needs.test.result == 'success'
      run: |
        echo "✅ Todos los tests pasaron exitosamente"

    - name: Marcar como fallido si tests fallaron
      if: needs.test.result != 'success'
      run: |
        echo "❌ Los tests fallaron"
        exit 1
